<!DOCTYPE html>
<html>
<head>
    <title>Gallery - Versatile IT</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
        }

        h1 {
            margin-top: 20px;
        }

        .section {
            margin: 40px;
        }

        .gallery-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
        }

        .card {
            width: 280px;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        .card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .card h3 {
            margin: 10px;
        }

        /* CEO special style */
        .ceo img {
            height: 250px;
        }
    </style>
</head>

<body>

<h1>Company Gallery</h1>

<!-- CEO Section -->
<div class="section">
    <h2>Our CEO</h2>

    <div class="gallery-container">

        <div class="card ceo">
            <img src="{{ url_for('static', filename='images/ceo.jpg') }}">
            <h3>Srinivas Mogilipala</h3>
            <p>CEO - Versatile IT Solutions</p>
        </div>

    </div>
</div>

<!-- Events Section -->
<div class="section">
    <h2>Company Celebrations</h2>

    <div class="gallery-container">

        <div class="card">
            <img src="{{ url_for('static', filename='images/event1.jpg') }}">
            <h3>A New Milestone</h3>
        </div>

        <div class="card">
            <img src="{{ url_for('static', filename='images/event2.jpg') }}">
            <h3>A decade Celebration</h3>
        </div>

        <div class="card">
            <img src="{{ url_for('static', filename='images/event3.jpg') }}">
            <h3>Festival together</h3>
        </div>

    </div>
</div>

</body>
</html>
