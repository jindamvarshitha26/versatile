<!DOCTYPE html>

<html>
<head>
    <title>Register - Versatile IT</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">


<style>
    body {
        margin: 0;
        font-family: 'Segoe UI', sans-serif;
        background: linear-gradient(135deg, #e0f2fe, #bae6fd);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .auth-container {
        width: 100%;
        display: flex;
        justify-content: center;
    }

    .auth-form {
        background: rgba(255, 255, 255, 0.9);
        padding: 40px;
        width: 360px;
        border-radius: 15px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        backdrop-filter: blur(10px);
        text-align: center;
    }

    .auth-form h2 {
        margin-bottom: 20px;
        color: #0369a1;
    }

    .auth-form p.subtitle {
        font-size: 14px;
        color: #475569;
        margin-bottom: 20px;
    }

    .auth-form input {
        width: 100%;
        padding: 12px;
        margin: 10px 0;
        border-radius: 8px;
        border: 1px solid #cbd5f5;
        outline: none;
        font-size: 14px;
        transition: 0.3s;
    }

    .auth-form input:focus {
        border-color: #0ea5e9;
        box-shadow: 0 0 6px rgba(14,165,233,0.3);
    }

    .auth-form button {
        width: 100%;
        padding: 12px;
        margin-top: 15px;
        border: none;
        border-radius: 8px;
        background: #0ea5e9;
        color: white;
        font-size: 16px;
        cursor: pointer;
        transition: 0.3s;
    }

    .auth-form button:hover {
        background: #0284c7;
        transform: scale(1.03);
    }

    .auth-form p {
        margin-top: 15px;
        font-size: 14px;
    }

    .auth-form a {
        color: #0ea5e9;
        text-decoration: none;
        font-weight: 500;
    }

    .auth-form a:hover {
        text-decoration: underline;
    }

    @media (max-width: 500px) {
        .auth-form {
            width: 90%;
        }
    }
</style>


</head>

<body>

<div class="auth-container">
    <form class="auth-form">


    <h2>Create Account 🚀</h2>
    <p class="subtitle">Join us and start your journey</p>

    <input type="text" placeholder="👤 Full Name" required>
    <input type="email" placeholder="📧 Email Address" required>
    <input type="password" placeholder="🔒 Password" required>

    <button>Register</button>

    <p>Already have an account? <a href="/login">Login</a></p>

</form>

</div>

</body>
</html>
